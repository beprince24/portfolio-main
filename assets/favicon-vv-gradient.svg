<?xml version="1.0" encoding="utf-8"?>
<!-- Polished gradient circular favicon with "VV" monogram -->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Vishnu Vighas logo - VV">
  <title>Vishnu Vighas — VV</title>
  <defs>
    <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- background circle with subtle shadow -->
  <g filter="url(#shadow)">
    <circle cx="32" cy="32" r="30" fill="url(#grad)"/>
  </g>

  <!-- Double-V monogram (VV) - white stroke with slight inner accent -->
  <!-- Left V -->
  <path d="M18 20 L28.5 44 L34 34" fill="none" stroke="#ffffff" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right V (mirrored, offset) -->
  <path d="M30 20 L40.5 44 L46 34" fill="none" stroke="#ffffff" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- subtle inner highlight to add depth -->
  <path d="M22 22 L28.5 38 L35 26" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- small accent dot (optional) -->
  <circle cx="50" cy="14" r="2.2" fill="rgba(255,255,255,0.18)"/>
</svg>